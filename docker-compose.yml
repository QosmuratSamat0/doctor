version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  doctor-service:
    build:
      context: ./doctor-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/doctors?sslmode=disable
      NATS_URL: nats://nats:4222
      PORT: 8081
      GRPC_PORT: 9091
    ports:
      - "8081:8081"
      - "9091:9091"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_started

  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/appointments?sslmode=disable
      NATS_URL: nats://nats:4222
      PORT: 8082
      GRPC_PORT: 9092
      DOCTOR_SERVICE_ADDR: doctor-service:9091
    ports:
      - "8082:8082"
      - "9092:9092"
    depends_on:
      db:
        condition: service_healthy
      doctor-service:
        condition: service_started
      nats:
        condition: service_started

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_started

  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"

  migrate-doctor:
    image: migrate/migrate
    volumes:
      - ./doctor-service/migrations:/migrations
    command: -path=/migrations/ -database "postgres://postgres:postgres@db:5432/doctors?sslmode=disable" up
    depends_on:
      db:
        condition: service_healthy

  migrate-appointment:
    image: migrate/migrate
    volumes:
      - ./appointment-service/migrations:/migrations
    command: -path=/migrations/ -database "postgres://postgres:postgres@db:5432/appointments?sslmode=disable" up
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
